<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Sniff Simulation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<style>
:root {
  --bg: #f4f7f0;
  --card: #ffffff;
  --border: #d8e4c8;
  --text-primary: #1a2e0f;
  --text-secondary: #4a6535;
  --text-muted: #7a9460;
  --accent: #3B6D11;
  --accent2: #1D9E75;
  --btn-bg: #3B6D11;
  --btn-text: #ffffff;
  --dot-off: #c8ddb0;
  --dot-on: #3B6D11;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text-primary);
  min-height: 100vh;
  padding: 0;
}

@media (prefers-reduced-motion: no-preference) {
  @keyframes bob    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  @keyframes drift  { 0%{transform:translate(0,0);opacity:0} 20%{opacity:1} 100%{transform:translate(var(--dx,20px),var(--dy,-60px));opacity:0} }
  @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:.3} }
  @keyframes pulse  { 0%,100%{r:6} 50%{r:10} }
  @keyframes ripple { 0%{r:8;opacity:.8} 100%{r:40;opacity:0} }
  @keyframes rise   { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-80px) scale(1.6);opacity:0} }
  @keyframes slide  { 0%{transform:translateX(0)} 100%{transform:translateX(60px)} }
  @keyframes ping   { 0%{transform:scale(1);opacity:.9} 100%{transform:scale(2.8);opacity:0} }
  @keyframes notif  { 0%{transform:translateY(-30px);opacity:0} 30%{transform:translateY(0);opacity:1} 90%{transform:translateY(0);opacity:1} 100%{transform:translateY(-30px);opacity:0} }
  @keyframes scanline { 0%{transform:translateY(-2px)} 100%{transform:translateY(2px)} }
  @keyframes dataflow { 0%{stroke-dashoffset:80} 100%{stroke-dashoffset:0} }
  @keyframes windgust { 0%{transform:translateX(0);opacity:0} 20%{opacity:.7} 100%{transform:translateX(100px);opacity:0} }
  @keyframes zoomin  { 0%{transform:scale(0.3);opacity:0} 100%{transform:scale(1);opacity:1} }
  @keyframes fadeup  { 0%{opacity:0;transform:translateY(16px)} 100%{opacity:1;transform:translateY(0)} }
  @keyframes growbar { 0%{width:0} 100%{width:var(--w)} }

  .anim-bob    { animation: bob 2s ease-in-out infinite; }
  .anim-drift  { animation: drift 2.5s ease-out infinite; }
  .anim-blink  { animation: blink 1s ease-in-out infinite; }
  .anim-ripple { animation: ripple 1.8s ease-out infinite; }
  .anim-rise   { animation: rise 3s ease-out infinite; }
  .anim-ping   { animation: ping 1.5s ease-out infinite; }
  .anim-notif  { animation: notif 4s ease-in-out infinite; }
  .anim-scan   { animation: scanline .8s ease-in-out infinite alternate; }
  .anim-flow   { animation: dataflow 2s linear infinite; }
  .anim-wind   { animation: windgust 2s ease-out infinite; }
  .anim-zoomin { animation: zoomin .5s ease-out forwards; }
  .anim-fadeup { animation: fadeup .5s ease-out forwards; }
}

#stepper {
  max-width: 740px;
  margin: 0 auto;
  padding: 24px 20px 32px;
}

.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

#dots { display: flex; align-items: center; gap: 6px; }
.dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--dot-off);
  display: inline-block;
  transition: background .25s, transform .25s;
}
.dot.on { background: var(--dot-on); transform: scale(1.25); }

#scene-label {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: .04em;
}

#scene-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 6px;
  letter-spacing: -.01em;
}

#scene-narration {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 16px;
  min-height: 40px;
  line-height: 1.6;
}

#scene-wrap {
  border-radius: 14px;
  border: 1px solid var(--border);
  overflow: hidden;
  background: #f8faf4;
  box-shadow: 0 2px 12px rgba(59,109,17,.07);
}

.nav-row {
  display: flex;
  gap: 10px;
  margin-top: 18px;
}

.nav-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 11px 20px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--text-primary);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background .18s, border-color .18s, color .18s, transform .12s;
}
.nav-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.nav-btn:active { transform: scale(.97); }
.nav-btn:disabled { opacity: .35; pointer-events: none; }

.scene { display: none; }
.scene.active { display: block; }

.progress-track {
  height: 3px;
  background: var(--border);
  border-radius: 99px;
  margin-bottom: 20px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 99px;
  transition: width .4s cubic-bezier(.4,0,.2,1);
}
</style>

<div id="stepper">
  <div class="top-bar">
    <div id="dots"></div>
    <div id="scene-label" style="font-size:12px;color:var(--text-muted);">Scene 1 of 9</div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:11%"></div></div>

  <div id="scene-title"></div>
  <div id="scene-narration"></div>

  <div id="scene-wrap"></div>

  <div class="nav-row">
    <button class="nav-btn" id="btn-prev" onclick="stepBy(-1)">&#8592; Prev</button>
    <button class="nav-btn" id="btn-next" onclick="stepBy(1)">Next &#8594;</button>
  </div>
</div>

/* ── Controller ──────────────────────────────────────────── */
let cur = 0;
const total = scenes.length;

function render() {
  const s = scenes[cur];
  document.getElementById('scene-title').textContent = s.title;
  document.getElementById('scene-narration').textContent = s.narration;
  document.getElementById('scene-wrap').innerHTML = s.svg;
  document.getElementById('scene-label').textContent = `Scene ${cur+1} of ${total}`;
  document.getElementById('progress-fill').style.width = `${((cur+1)/total)*100}%`;
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === total-1;

  // dots
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  for(let i=0;i<total;i++){
    const d=document.createElement('span');
    d.className='dot'+(i===cur?' on':'');
    d.onclick=()=>{cur=i;render();};
    d.style.cursor='pointer';
    dotsEl.appendChild(d);
  }
}

function stepBy(d){
  cur = Math.max(0, Math.min(total-1, cur+d));
  render();
}

render();
</script>
